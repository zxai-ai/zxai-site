<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Your Free Discovery Call — ZxAI</title>
  <meta name="description" content="Schedule a free 30-minute discovery call with ZxAI. See how AI agents can eliminate busywork at your medical practice.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23060B18'/%3E%3Ccircle cx='16' cy='16' r='8' fill='none' stroke='%2306B6D4' stroke-width='1.5'/%3E%3Cline x1='19' y1='9' x2='13' y2='23' stroke='%2306B6D4' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2TJ8X70VZT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2TJ8X70VZT');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hero: #060B18;
      --cyan: #06B6D4;
      --white: #FFFFFF;
      --gray-400: #94A3B8;
      --gray-600: #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--hero);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      width: 100%;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--white);
      text-decoration: none;
    }
    .logo-text span { color: var(--cyan); }

    /* Main content area */
    .main {
      width: 100%;
      max-width: 1000px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1.5rem 2rem;
    }

    .headline {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .headline h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .headline h1 em {
      font-style: normal;
      color: var(--cyan);
    }
    .headline p {
      color: var(--gray-400);
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    /* Iframe container */
    .calendar-wrap {
      width: 100%;
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 1rem;
      position: relative;
      min-height: 680px;
    }
    .calendar-wrap iframe {
      width: 100%;
      height: 700px;
      border: none;
      display: block;
    }

    /* Loading state */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Trust bar */
    .trust {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.25rem;
      color: var(--gray-400);
      font-size: 0.875rem;
    }
    .trust span::before {
      content: '✓ ';
      color: var(--cyan);
      font-weight: 600;
    }

    /* Footer */
    .footer {
      padding: 1.5rem;
      text-align: center;
      color: var(--gray-600);
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      .calendar-wrap iframe { height: 600px; }
      .trust { gap: 1rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="/" class="logo-text">Zx<span>AI</span></a>
  </div>

  <div class="main">
    <div class="headline">
      <h1>Pick a time. <em>We'll handle the rest.</em></h1>
      <p>30 minutes. Zero cost. Zero pressure.</p>
    </div>

    <div class="calendar-wrap" id="calendarWrap">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
      </div>
      <iframe
        id="bookingFrame"
        src="https://calendar.app.google/jF4TiJNkzXP8DE8n9"
        title="Schedule a Discovery Call"
        loading="eager"
      ></iframe>
    </div>

    <div class="trust">
      <span>30-minute call</span>
      <span>No credit card</span>
      <span>No sales pressure</span>
      <span>HIPAA compliant</span>
    </div>
  </div>

  <div class="footer">
    &copy; 2026 ZxAI. All rights reserved.
  </div>

  <script>
    // Hide loading spinner once iframe loads
    const iframe = document.getElementById('bookingFrame');
    const overlay = document.getElementById('loadingOverlay');
    iframe.addEventListener('load', () => {
      overlay.classList.add('hidden');
    });

    // Google Calendar embeds don't allow cross-origin access,
    // so we can't detect the confirmation inside the iframe directly.
    // Instead, we use two detection strategies:

    // Strategy 1: Listen for iframe navigation events via load
    // Google's booking widget fires a new 'load' event after confirmation.
    let loadCount = 0;
    iframe.addEventListener('load', () => {
      loadCount++;
      // First load = initial page. Second load = confirmation after booking.
      if (loadCount >= 2) {
        gtag('event', 'booking_initiated', {
          event_category: 'conversion',
          event_label: 'calendar_embed'
        });
        // Short delay to let user see the Google confirmation, then redirect
        setTimeout(() => {
          window.location.href = '/booking-confirmed.html';
        }, 2000);
      }
    });

    // Strategy 2: Fallback — poll for visibility/focus changes
    // When the user completes booking, they often switch focus back to the page.
    // We show a subtle "Done booking?" prompt after enough time has passed.
    let interactionTimer = null;
    const INTERACTION_DELAY = 60000; // 60 seconds after page load

    setTimeout(() => {
      // After 60s, if user clicks anywhere outside the iframe, offer redirect
      document.addEventListener('click', function redirectPrompt(e) {
        if (!document.getElementById('doneBar')) {
          const bar = document.createElement('div');
          bar.id = 'doneBar';
          bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#0F172A;border-top:1px solid #1E293B;padding:1rem;text-align:center;z-index:999;animation:slideUp 0.3s ease';
          bar.innerHTML = `
            <span style="color:#94A3B8;margin-right:1rem;">Already booked your call?</span>
            <a href="/booking-confirmed.html" style="background:#06B6D4;color:#060B18;padding:0.6rem 1.5rem;border-radius:8px;font-weight:600;text-decoration:none;font-size:0.95rem;">Yes — show me what's next →</a>
          `;
          document.body.appendChild(bar);
          // Add slideUp animation
          const style = document.createElement('style');
          style.textContent = '@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}';
          document.head.appendChild(style);
        }
      });
    }, INTERACTION_DELAY);
  </script>

</body>
</html>

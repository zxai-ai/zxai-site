name = "zxai-audit"
main = "src/workers/pipeline.ts"
compatibility_date = "2024-06-01"

# Worker routes on zxai.ai.
# Only /api/demo-events is routed through the Worker so the analytics
# endpoint is reachable from prospect browsers at the same origin. All
# other /api/* endpoints stay on the workers.dev URL and are called by
# frontend JS via the full .workers.dev apiBase (see frontdesk/config.js).
# /ai-staff/* is served entirely by Cloudflare Pages.
routes = [
  { pattern = "zxai.ai/api/demo-events", zone_name = "zxai.ai" },
]

# Static assets (HTML pages served alongside the Worker)
[assets]
directory = "src/pages"

[[d1_databases]]
binding = "DB"
database_name = "audit-db"
database_id = "f8c6624e-b638-490b-8e51-a89e1180084d"

# --- Front Desk demo (Katie) ---
# Non-secret defaults go in [vars]. Secrets are set with:
#   wrangler secret put <NAME>
# Required secrets:
#   GEMINI_API_KEY
#   TURNSTILE_SECRET
#   GOOGLE_OAUTH_CLIENT_ID
#   GOOGLE_OAUTH_CLIENT_SECRET
#   GOOGLE_OAUTH_REFRESH_TOKEN
[vars]
DEMO_ENABLED = "true"
DEMO_DAILY_MINT_CAP = "400"
DEMO_CALENDAR_ID = "am@zxai.ai"
DEMO_OWNER_NAME = "Anthony Mesa"
